<div class="page-shell">
  <header class="topbar">
    <a class="brand" routerLink="/">{{ title }}</a>
    <nav aria-label="Site navigation" class="profile-nav">
      <a routerLink="/resume">Resume</a>
      @for (profile of profileLinks; track profile.label) {
        <a [href]="profile.href" target="_blank" rel="noopener noreferrer">{{ profile.label }}</a>
      }
    </nav>
  </header>

  <main>
    <router-outlet />
  </main>

  <footer>
    <p>© {{ currentYear }} {{ title }}.</p>
    <p>Built with <a href="https://angular.io" target="_blank" rel="noopener noreferrer">Angular</a>.</p>
  </footer>
</div>
